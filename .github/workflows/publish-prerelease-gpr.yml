name: Publish Prerelease (NuGet.org)

on:
  push:
    tags:
      - 'v*.*.*-*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish-prerelease:
    runs-on: ubuntu-latest

    steps:
      - name: Validate prerelease tag ref
        run: |
          if [[ ! "${GITHUB_REF}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-.+$ ]]; then
            echo "Prerelease publish requires a vX.Y.Z-suffix tag ref. Received: ${GITHUB_REF}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to NuGet.org (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore IBeam.sln

      - name: Build
        run: dotnet build IBeam.sln -c Release --no-restore

      - name: Pack
        run: dotnet pack IBeam.sln -c Release --no-build -o ./artifacts/packages

      - name: Push prerelease packages to NuGet.org
        run: |
          dotnet nuget push "./artifacts/packages/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
