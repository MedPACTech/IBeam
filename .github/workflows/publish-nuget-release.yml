name: Publish Stable (NuGet.org)

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish-stable:
    if: startsWith(github.event.release.tag_name, 'v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Resolve release package version
        id: release_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Stable package publishing requires a semver tag like v2.0.61. Got '$tag'." >&2
            exit 1
          fi

          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved package version: $version"

      - name: Login to NuGet.org (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore IBeam.sln

      - name: Build
        run: dotnet build IBeam.sln -c Release --no-restore -p:ReleasePackageVersion=${{ steps.release_version.outputs.version }}

      - name: Pack
        run: dotnet pack IBeam.sln -c Release --no-build -p:ReleasePackageVersion=${{ steps.release_version.outputs.version }} -o ./artifacts/packages

      - name: Push stable packages to NuGet.org
        run: |
          dotnet nuget push "./artifacts/packages/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
