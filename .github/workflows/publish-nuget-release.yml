name: Publish Stable (NuGet.org)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish-stable:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to NuGet.org (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore IBeam.sln

      - name: Build
        run: dotnet build IBeam.sln -c Release --no-restore

      - name: Pack
        run: dotnet pack IBeam.sln -c Release --no-build -o ./artifacts/packages

      - name: Push stable packages to NuGet.org
        run: |
          dotnet nuget push "./artifacts/packages/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
