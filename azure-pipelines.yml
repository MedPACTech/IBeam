# Agent Queue 'Azure Pipelines' was used with unrecognized Agent Specification, vmImage property must be specified to determine image - https://docs.microsoft.com/en-us/azure/devops/pipelines/agents/hosted?view=azure-devops&tabs=yaml#software
trigger: 
- none

#pool:
#  vmImage: 'windows-latest'

variables:
 buildPlatform: 'AnyCPU'
 buildConfiguration: 'Release'
 solution: '**/IBeam.sln'
 project: '**/IBeam.DataModels.csproj'  
 Major: '1'
 Minor: '1'
 Patch: '0'
 ArtifactNugetName: 'packages-nuget'  

#resources:
#  repositories:
#  - repository: self
#    type: git
#    ref: refs/heads/qa
#

steps:
- task: NuGetToolInstaller@1
  name: 'NuGetToolInstaller'
  displayName: 'NuGet Tool Installer'

- task: NuGetCommand@2
  inputs:
    command: 'restore'
    restoreSolution: '$(project)'
    feedsToUse: 'select'

- task: DotNetCoreCLI@2
  inputs:
    command: 'build'
    projects: '$(project)'
    arguments: '--configuration $(buildConfiguration)'

- task: DotNetCoreCLI@2
  displayName: 'Create nuget package'
  inputs:
      command: 'pack'
      packagesToPack: '**/IBeam.DataModels.csproj;'
      packDirectory: '$(Build.ArtifactStagingDirectory)'
      #nobuild: true
      #versioningScheme: 'byPrereleaseNumber'
      #majorVersion: '$(Major)'
      #minorVersion: '$(Minor)'
      #patchVersion: '$(Patch)'

#- publish: '$(Build.ArtifactStagingDirectory)/packages/nuget'
#  displayName: 'Publish Artifact: $(ArtifactNugetName)'
#  artifact: 'packages-nuget'
  #condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))

- script: |
    dotnet nuget push "$(Build.ArtifactStagingDirectory)/**.nupkg" --source https://nuget.pkg.github.com/MedPACTech/index.json  --api-key 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 --skip-duplicate
