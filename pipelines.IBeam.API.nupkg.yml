trigger:
  branches:
    include:
    - main

pool:
  vmImage: 'ubuntu-22.04'  # ✅ Required to specify the build agent

variables:
  buildPlatform: 'AnyCPU'
  buildConfiguration: 'Release'
  solution: '**/IBeam.sln'
  project: '**/IBeam.DataModels.csproj'
  packageLocation: 'https://nuget.pkg.github.com/MedPACTech/index.json'
  apiKey: '$(GH_TOKEN)'  # ✅ Secure GitHub token reference

steps:
- task: NuGetToolInstaller@1
  displayName: 'Install NuGet'

- task: NuGetCommand@2
  displayName: 'Restore Packages'
  inputs:
    command: 'restore'
    restoreSolution: '$(solution)'  # ✅ Use .sln instead of .csproj for restore
    feedsToUse: 'select'

- task: DotNetCoreCLI@2
  displayName: 'Build Project'
  inputs:
    command: 'build'
    projects: '$(project)'
    arguments: '--configuration $(buildConfiguration)'

- task: DotNetCoreCLI@2
  displayName: 'Pack NuGet Package'
  inputs:
    command: 'pack'
    packagesToPack: '$(project)'
    packDirectory: '$(Build.ArtifactStagingDirectory)'

- script: |
    dotnet nuget push "$(Build.ArtifactStagingDirectory)/**/*.nupkg" --source $(packageLocation) --api-key $(apiKey) --skip-duplicate
  displayName: 'Push NuGet Package'
