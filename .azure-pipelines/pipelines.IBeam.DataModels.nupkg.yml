trigger:
  branches:
    include:
    - main

pool:
  vmImage: 'ubuntu-22.04'

variables:
- group: GitHubNuGetSecrets

- name: buildPlatform
  value: 'AnyCPU'

- name: buildConfiguration
  value: 'Release'

- name: solution
  value: '**/IBeam.sln'

- name: project
  value: '**/IBeam.DataModels.csproj'

- name: packageLocation
  value: 'https://nuget.pkg.github.com/MedPACTech/index.json'

- name: apiKey
  value: '$(GITHUB_PAT)'

stages:
- stage: BuildAndPush
  jobs:
  - job: BuildJob
    steps:
    - template: templates/dotnet-nuget-build.yml
      parameters:
        solution: $(solution)
        project: $(project)
        packageLocation: $(packageLocation)
        apiKey: $(apiKey)
