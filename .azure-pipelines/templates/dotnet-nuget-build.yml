parameters:
- name: solution
  type: string
- name: project
  type: string
- name: packageLocation
  type: string
- name: buildPlatform
  type: string
  default: 'AnyCPU'
- name: buildConfiguration
  type: string
  default: 'Release'
- name: apiKey
  type: string

steps:
- task: NuGetToolInstaller@1
  displayName: 'NuGet Tool Installer'

- task: NuGetCommand@2
  displayName: 'Restore Packages'
  inputs:
    command: 'restore'
    restoreSolution: ${{ parameters.solution }}
    feedsToUse: 'select'

- script: |
    set -e
    dotnet tool install --tool-path . nbgv
    ./nbgv cloud
  displayName: 'NBGV: set version variables'

- script: |
    set -e
    BASE_VERSION="$(GitBuildVersionSimple)"
    BASE_VERSION="${BASE_VERSION%-dev}"
    SOURCE_BRANCH="$(Build.SourceBranch)"
    PACKAGE_VERSION="$BASE_VERSION"

    if [ "$SOURCE_BRANCH" != "refs/heads/main" ] && [[ ! "$SOURCE_BRANCH" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
      PACKAGE_VERSION="${BASE_VERSION}-dev"
    fi

    echo "Using PackageVersion=$PACKAGE_VERSION for SourceBranch=$SOURCE_BRANCH"
    echo "##vso[task.setvariable variable=PackageVersion]$PACKAGE_VERSION"
  displayName: 'Set package version for branch'

# Build
- task: DotNetCoreCLI@2
  displayName: 'Build Project'
  inputs:
    command: 'build'
    projects: ${{ parameters.project }}
    arguments: '--configuration ${{ parameters.buildConfiguration }}'

# Clean artifact folder (prevents stale nupkg issues)
- script: rm -rf $(Build.ArtifactStagingDirectory)/*
  displayName: 'Clean artifact staging directory'

# Pack (uses NBGV version)
- task: DotNetCoreCLI@2
  displayName: 'Create NuGet Package'
  inputs:
    command: 'pack'
    packagesToPack: ${{ parameters.project }}
    packDirectory: '$(Build.ArtifactStagingDirectory)'
    arguments: >
      --configuration ${{ parameters.buildConfiguration }}
      --no-build
      /p:PackageVersion=$(PackageVersion)

- script: |
    dotnet nuget push "$(Build.ArtifactStagingDirectory)/**/*.nupkg" \
      --source ${{ parameters.packageLocation }} \
      --api-key ${{ parameters.apiKey }} \
      --skip-duplicate
  displayName: 'Push NuGet Package'
