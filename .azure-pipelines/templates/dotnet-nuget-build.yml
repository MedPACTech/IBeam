parameters:
- name: solution
  type: string
- name: project
  type: string
- name: packageLocation
  type: string
- name: buildPlatform
  type: string
  default: 'AnyCPU'
- name: buildConfiguration
  type: string
  default: 'Release'
- name: apiKey
  type: string
- name: publishPackages
  type: boolean
  default: false
- name: testProjectPattern
  type: string
  default: ''

steps:
- task: NuGetToolInstaller@1
  displayName: 'NuGet Tool Installer'

- task: NuGetCommand@2
  displayName: 'Restore Packages'
  inputs:
    command: 'restore'
    restoreSolution: ${{ parameters.solution }}
    feedsToUse: 'select'

- script: |
    set -e
    PROJECT_PATTERN='${{ parameters.project }}'
    SOURCE_BRANCH='$(Build.SourceBranch)'
    BUILD_ID='$(Build.BuildId)'
    PROJECT_FILE="$(find . -name "$(basename "$PROJECT_PATTERN")" -not -path "*/obj/*" | head -n 1)"

    if [ -z "$PROJECT_FILE" ]; then
      echo "Could not resolve project file for pattern: $PROJECT_PATTERN"
      exit 1
    fi

    BASE_VERSION="$(grep -oPm1 '(?<=<VersionPrefix>)[^<]+' "$PROJECT_FILE" || true)"
    if [ -z "$BASE_VERSION" ]; then
      BASE_VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' "$PROJECT_FILE" || true)"
    fi
    if [ -z "$BASE_VERSION" ]; then
      echo "No <VersionPrefix> or <Version> found in $PROJECT_FILE"
      exit 1
    fi

    PACKAGE_VERSION="$BASE_VERSION"
    if [ "$SOURCE_BRANCH" != "refs/heads/main" ] && [[ ! "$SOURCE_BRANCH" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
      PACKAGE_VERSION="${BASE_VERSION}-dev.${BUILD_ID}"
    fi

    echo "Using project file: $PROJECT_FILE"
    echo "Using PackageVersion=$PACKAGE_VERSION for SourceBranch=$SOURCE_BRANCH"
    echo "##vso[task.setvariable variable=PackageVersion]$PACKAGE_VERSION"
  displayName: 'Set package version for branch'

- script: |
    set -e
    EFFECTIVE_VERSION='$(PackageVersion)'
    if [[ "$EFFECTIVE_VERSION" == *'$('* ]]; then
      echo "PackageVersion did not resolve: $EFFECTIVE_VERSION"
      exit 1
    fi
    echo "Resolved PackageVersion=$EFFECTIVE_VERSION"
  displayName: 'Validate resolved package version'

# Build
- task: DotNetCoreCLI@2
  displayName: 'Build Project'
  inputs:
    command: 'build'
    projects: ${{ parameters.project }}
    arguments: '--configuration ${{ parameters.buildConfiguration }} /p:PackageVersion=$(PackageVersion)'

- script: |
    set -e
    TEST_PATTERN='${{ parameters.testProjectPattern }}'
    if [ -z "$TEST_PATTERN" ]; then
      echo "No testProjectPattern provided for this package pipeline. Skipping tests."
      exit 0
    fi

    mapfile -t TEST_PROJECTS < <(find . -name "$(basename "$TEST_PATTERN")" -not -path "*/obj/*" | sort)
    if [ "${#TEST_PROJECTS[@]}" -eq 0 ]; then
      echo "No test projects found matching $TEST_PATTERN. Skipping tests."
      exit 0
    fi

    for testProject in "${TEST_PROJECTS[@]}"; do
      echo "Running tests for $testProject"
      dotnet test "$testProject" \
        --configuration ${{ parameters.buildConfiguration }} \
        --no-restore
    done
  displayName: 'Test Projects'

# Clean artifact folder (prevents stale nupkg issues)
- script: rm -rf $(Build.ArtifactStagingDirectory)/*
  displayName: 'Clean artifact staging directory'

# Pack (uses NBGV version)
- task: DotNetCoreCLI@2
  displayName: 'Create NuGet Package'
  inputs:
    command: 'pack'
    packagesToPack: ${{ parameters.project }}
    packDirectory: '$(Build.ArtifactStagingDirectory)'
    arguments: >
      --configuration ${{ parameters.buildConfiguration }}
      --no-build
      /p:PackageVersion=$(PackageVersion)

- script: |
    dotnet nuget push "$(Build.ArtifactStagingDirectory)/**/*.nupkg" \
      --source ${{ parameters.packageLocation }} \
      --api-key ${{ parameters.apiKey }} \
      --skip-duplicate
  displayName: 'Push NuGet Package'
  condition: and(succeeded(), eq('${{ parameters.publishPackages }}', 'true'), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/tags/v')))
